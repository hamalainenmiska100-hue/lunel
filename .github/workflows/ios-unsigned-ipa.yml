name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ios-unsigned-ipa.yml"

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-14
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate iOS native project
        run: npx --yes expo prebuild --platform ios --non-interactive --clean

      - name: Install CocoaPods
        run: npx pod-install ios

      - name: Build unsigned archive
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/lunel.xcworkspace \
            -scheme lunel \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/lunel.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find "$PWD/build/lunel.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive output"
            exit 1
          fi

          rm -rf "$PWD/build/Payload"
          mkdir -p "$PWD/build/Payload"
          cp -R "$APP_PATH" "$PWD/build/Payload/"

          (cd "$PWD/build" && zip -qry "lunel-unsigned.ipa" Payload)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunel-ios-unsigned-ipa
          path: app/build/lunel-unsigned.ipa
          if-no-files-found: error
